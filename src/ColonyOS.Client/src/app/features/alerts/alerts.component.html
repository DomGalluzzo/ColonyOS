<section class="alerts-panel">
    <header class="alerts-panel__header">
        <div>
            <p class="eyebrow">INCIDENT MONITOR</p>
            <h2>Active Alerts</h2>
        </div>

        <div class="alert-count" [class.alert-count--active]="alerts.length">
            {{ alerts.length }}
        </div>
    </header>

    <div *ngIf="!alerts.length" class="empty-state">
        <span class="empty-state__icon">✓</span>
        <div>
            <p>All systems nominal</p>
            <small>No active incident signals detected.</small>
        </div>
    </div>

    <div class="alert-feed" *ngIf="alerts.length">
        <article
            *ngFor="let alert of alerts; trackBy: trackByAlertId"
            class="alert-item"
            [ngClass]="{
                'alert-item--critical': alert.severity === alertSeverity.Critical,
                'alert-item--warning': alert.severity === alertSeverity.Warning,
                'alert-item--acknowledged': alert.acknowledged
            }">

            <div class="alert-item__signal">
                <span></span>
            </div>

            <div class="alert-item__content">
                <div class="alert-item__meta">

                    <span class="alert-time">
                        {{ alert.createdUtc | date:'HH:mm:ss' }}
                    </span>
                </div>

                <p class="alert-message">
                    {{ alert.message }}
                </p>

                <div class="alert-actions" *ngIf="!alert.acknowledged">
                    <button
                        type="button"
                        class="command-button command-button--secondary"
                        (click)="acknowledgeAlert(alert.id)">
                        Acknowledge
                    </button>

                    <button
                        type="button"
                        class="command-button command-button--primary"
                        (click)="openCreateTask(alert)">
                        Dispatch Task
                    </button>
                </div>

                <div class="acknowledged-status" *ngIf="alert.acknowledged">
                    ACKNOWLEDGED
                </div>
            </div>
        </article>
    </div>

    <div
        #createTaskModal
        class="modal fade"
        id="createTaskModal"
        tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content mission-modal">
                <div class="modal-header mission-modal__header">
                    <div>
                        <p class="eyebrow">TASK AUTHORIZATION</p>
                        <h2 class="modal-title fs-5" id="createTaskModalLabel">
                            Dispatch Response Task
                        </h2>
                    </div>

                    <button
                        type="button"
                        class="mission-modal__close"
                        (click)="closeCreateTask()">
                        ×
                    </button>
                </div>

                <div class="modal-body mission-modal__body">
                    <app-tasks-form
                        *ngIf="selectedAlert"
                        [alert]="selectedAlert"
                        (taskCreated)="taskCreated($event)"
                        (closeTaskModel)="closeCreateTask()">
                    </app-tasks-form>
                </div>
            </div>
        </div>
    </div>
</section>
