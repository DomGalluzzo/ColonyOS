<div class="card h-100 shadow-sm mb-4">
    <div class="card-header">
        <div class="d-flex justify-content-between align-items-center mb-1">
            <h2 class="h4 mb-0">Active Alerts</h2>
            <span class="badge rounded-pill text-bg-danger">{{ alerts.length }}</span>
        </div>
    </div>

    <div *ngIf="!alerts.length" class="card-body text-muted">
        All systems nominal
    </div>

    <div
        *ngFor="let alert of alerts; trackBy: trackByAlertId"
        class="card m-2 border-1 shadow-sm"
        [ngClass]="{
            'border-start border-4 border-danger': alert.severity === alertSeverity.Critical,
            'border-start border-4 border-warning': alert.severity === alertSeverity.Warning,
            'opacity-75': alert.acknowledged
        }">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">
                <div class="d-flex flex-column gap-2 flex-grow-1">
                    <div class="d-flex align-items-center gap-2 flex-wrap">
                        <span
                            class="badge"
                            [ngClass]="{
                                'text-bg-danger': alert.severity === alertSeverity.Critical,
                                'text-bg-warning': alert.severity === alertSeverity.Warning,
                                'text-bg-secondary': alert.severity !== alertSeverity.Critical && alert.severity !== alertSeverity.Warning
                            }">
                            {{ alert.severity }}
                        </span>

                        <span class="text-muted small">
                            {{ alert.createdUtc | date:'short' }}
                        </span>
                    </div>

                    <div>
                        {{ alert.message }}
                    </div>
                </div>

                <div class="d-flex gap-2 flex-wrap" *ngIf="!alert.acknowledged">
                    <button
                        type="button"
                        class="btn btn-outline-secondary btn-sm"
                        (click)="acknowledgeAlert(alert.id)">
                        Acknowledge
                    </button>
                    <button
                        type="button"
                        class="btn btn-primary btn-sm"
                        (click)="openCreateTask(alert)">
                        Create Task
                    </button>
                </div>

                <div class="text-success fw-semibold" *ngIf="alert.acknowledged">
                    Acknowledged
                </div>
            </div>
        </div>
    </div>

    <div
        #createTaskModal
        class="modal fade"
        id="createTaskModal"
        tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content bg-dark text-light border-secondary">
                <div class="modal-header border-secondary">
                    <h2 class="modal-title fs-5" id="createTaskModalLabel">Create Task</h2>
                    <button
                        type="button"
                        class="btn-close btn-close-white"
                        (click)="closeCreateTask()"></button>
                </div>
                <div class="modal-body">
                    <app-tasks-form
                        *ngIf="selectedAlert"
                        [alert]="selectedAlert"
                        (taskCreated)="taskCreated($event)"></app-tasks-form>
                </div>
                <div class="modal-footer border-secondary">
                    <button
                        type="button"
                        class="btn btn-outline-light"
                        (click)="closeCreateTask()">
                        Close
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
