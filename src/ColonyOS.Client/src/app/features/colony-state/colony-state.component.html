<section class="systems-panel">
    <header class="systems-panel__header">
        <div>
            <p class="eyebrow">LUNAR COLONY</p>
            <h2>Life Support Telemetry</h2>
        </div>
    </header>

    <div class="resource-grid">
        <ng-container *ngFor="let resource of colonyState.resources">
            <article
                class="resource-tile"
                [ngClass]="[
                'resource-tile--' + getResourceStatus(resource),
                isResourceBeingRepaired(resource) ? 'resource-tile--recovering' : ''
            ]">

                <div class="resource-tile__top">
                    <div>
                        <p class="resource-code">{{ resource.colonyResourceType }}</p>
                        <h3>{{ resource.title }}</h3>
                    </div>

                    <span
                        class="resource-status"
                        *ngIf="getResourceStatus(resource) !== 'normal'">
                        <ng-container *ngIf="getResourceStatus(resource) === 'critical-low'">LOW</ng-container>
                        <ng-container *ngIf="getResourceStatus(resource) === 'warning-low'">NEAR LOW</ng-container>
                        <ng-container *ngIf="getResourceStatus(resource) === 'critical-high'">HIGH</ng-container>
                        <ng-container *ngIf="getResourceStatus(resource) === 'warning-high'">NEAR HIGH</ng-container>
                    </span>
                    <span
                        class="resource-status resource-status--recovering"
                        *ngIf="isResourceBeingRepaired(resource)">
                        REPAIRING
                    </span>
                </div>

                <div class="resource-reading">
                    <span class="resource-reading__value">{{ resource.percentage }}</span>
                    <span class="resource-reading__unit">%</span>
                </div>

                <div
                    class="telemetry-bar"
                    [ngClass]="{ 'telemetry-bar--recovering': isResourceBeingRepaired(resource) }">
                    <div
                        class="telemetry-bar__fill"
                        [style.width.%]="resource.percentage">
                    </div>
                </div>

                <div class="resource-thresholds">
                    <span *ngIf="resource.minThreshold !== null">
                        MIN {{ resource.minThreshold }}%
                    </span>

                    <span *ngIf="resource.maxThreshold !== null">
                        MAX {{ resource.maxThreshold }}%
                    </span>
                </div>
            </article>
        </ng-container>
    </div>
</section>
