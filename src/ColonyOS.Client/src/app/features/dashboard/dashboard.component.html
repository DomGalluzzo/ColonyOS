<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">ColonyOS Mission Control</h1>
    </div>
    <div *ngIf="isLoading" class="alert alert-info mb-4">
        Loading colony state...
    </div>
    <div *ngIf="errorMessage" class="alert alert-danger mb-4">
        {{ errorMessage }}
    </div>

    <div *ngIf="colonyState" class="row g-4">
        <p class="dashboard-footer">Last updated: {{ colonyState.lastUpdatedUtc }}</p>
        <div class="col-12 col-xl-6">
            <app-colony-state [colonyState]="colonyState"></app-colony-state>
        </div>
        <div class="col-12 col-xl-6">
            <app-alerts
            [alerts]="alerts"
            (alertAcknowledged)="acknowledgeAlertClicked($event)"></app-alerts>
        </div>
    </div>
</div>
