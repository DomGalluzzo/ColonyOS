<div class="dashboard-page">
    <header class="dashboard-header">
        <div>
            <p class="dashboard-kicker">LUNAR OPERATIONS COMMAND</p>
            <h1>ColonyOS Mission Control</h1>
        </div>

        <div class="dashboard-status">
            <div class="status-pill">
                <span class="status-dot"></span>
                LIVE TELEMETRY
            </div>

            <div class="timestamp" *ngIf="colonyState">
                LAST SYNC {{ colonyState.lastUpdatedUtc | date:'HH:mm:ss' }}
            </div>
        </div>
    </header>

    <section *ngIf="isLoading" class="system-message system-message--info">
        Establishing colony telemetry link...
    </section>

    <section *ngIf="errorMessage" class="system-message system-message--danger">
        {{ errorMessage.message }}
    </section>

    <main *ngIf="colonyState" class="command-grid">
        <app-colony-state
            class="command-grid__main"
            [colonyState]="colonyState">
        </app-colony-state>

        <app-alerts
            class="command-grid__side"
            [alerts]="colonyState.alerts"
            (alertAcknowledged)="acknowledgeAlertClicked($event)"
            (newTaskCreated)="newTaskCreated($event)">
        </app-alerts>

        <app-tasks
            class="command-grid__bottom"
            [tasks]="colonyState.tasks"
            (taskBeginClicked)="beginTask($event)">
        </app-tasks>
    </main>
</div>
