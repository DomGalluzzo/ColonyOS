<section class="tasks-panel">
    <header class="tasks-panel__header">
        <div>
            <p class="eyebrow">OPERATIONS QUEUE</p>
            <h2>Tasks</h2>
        </div>

        <div class="task-count">
            {{ tasks.length }}
        </div>
    </header>

    <div *ngIf="!tasks.length" class="empty-state">
        <span class="empty-state__icon">✓</span>
        <div>
            <p>No active task orders</p>
            <small>Operations queue is clear.</small>
        </div>
    </div>

    <div class="task-feed" *ngIf="tasks.length">
        <article
            *ngFor="let task of tasks; trackBy: trackByTaskId"
            class="task-item"
            [ngClass]="{
                'task-item--critical': task.taskPriority === taskPriority.Critical,
                'task-item--high': task.taskPriority === taskPriority.High
            }">

            <div class="task-item__header">
                <div>
                    <p class="task-priority">
                        {{ task.taskPriority }}
                    </p>

                    <h3>
                        {{ task.title }}
                    </h3>
                </div>

                <span
                    class="task-status"
                    [ngClass]="taskStatusMeta[task.status].class">
                    {{ taskStatusMeta[task.status].label }}
                </span>
            </div>

            <p class="task-description">
                {{ task.description }}
            </p>

            <footer class="task-item__footer">
                <span>CREATED</span>
                <time>{{ task.createdAtUtc | date:'HH:mm:ss' }}</time>
                <button
                    *ngIf="task.status === taskStatus.Pending"
                    type="button"
                    class="btn btn-success"
                    (click)="beginTask(task)">
                    Begin Task
                </button>

                <button
                    *ngIf="task.status === taskStatus.InProgress"
                    type="button"
                    class="btn btn-outline-warning"
                    disabled>
                    In Progress
                </button>

                <button
                    *ngIf="task.status === taskStatus.Completed"
                    type="button"
                    class="btn btn-outline-secondary"
                    disabled>
                    Completed
                </button>
            </footer>
        </article>
    </div>
</section>
