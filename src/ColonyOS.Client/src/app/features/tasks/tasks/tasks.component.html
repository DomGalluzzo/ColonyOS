<div class="card h-100 shadow-sm mb-4">
    <div class="card-header">
        <div class="d-flex justify-content-between align-items-center mb-1">
            <h2 class="h4 mb-0">Tasks</h2>
        </div>
    </div>
    <div
        *ngFor="let task of tasks; trackBy: trackByTaskId"
        class="card m-2 border-1 shadow-sm"
        [ngClass]="{
            'border-start border-4 border-danger': task.taskPriority === taskPriority.Critical,
            'border-start border-4 border-warning': task.taskPriority === taskPriority.High,
            'opacity-75': task.status === taskStatus.Completed
        }">
        <div class="card-body">
            <div class="d-flex row">
                <div class="col-12 d-flex justify-content-between mb-2">
                    <span class="fs-4 fw-bold">{{ task.title }}</span>
                    <span class="fs-5 fw-bold">{{ taskStatusMap[task.status] }}</span>
                </div>
            </div>
            <div class="col-4 d-flex flex-column mb-2">
                
                <span class="fs-6 fst-italic">{{ task.description }}</span>
            </div>
            <div class="d-flex row mb-2">
                <div class="col-4">
                    <span class="text-muted fs-6 fst-italic">Created: {{ task.createdAtUtc | date:'short' }}</span>
                </div>
            </div>
        </div>
    </div>
</div>
